name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html about.html notes.html 404.html rss.html sitemap.html _site/
          cp sitemap.xml robots.txt LICENSE _site/
          cp -R css blog rss assets ascii _site/
          find _site -name README.md -delete
          touch _site/.nojekyll

      - name: Validate deployment files
        run: |
          test -f _site/index.html
          test -f _site/404.html
          test -f _site/robots.txt
          test -f _site/sitemap.xml
          test -f _site/rss/feed.xml
          test -f _site/css/style.css
          test -f _site/blog/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
