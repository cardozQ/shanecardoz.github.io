<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RSS | Shane Cardoz</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div class="site-shell">
            <header class="site-header">
                <p class="prompt-line"><span>shane@freebsd</span>:<span>~</span>$ cat rss/feed.xml</p>
            </header>
            <main id="main-content">
                <section class="page-section">
                    <h1>RSS</h1>
                    <pre class="ascii-window ascii-window-compact" aria-label="feed status">
[ ok ] rss/feed.xml present
[ ok ] channel contains published posts
                    </pre>
                    <p>
                        The site exposes a basic feed at
                        <a href="rss/feed.xml">rss/feed.xml</a>.
                    </p>
                    <p>
                        Feed generation is still manual at this stage of the
                        build, which is acceptable until the content workflow is
                        formalized.
                    </p>
                </section>
            </main>
        </div>
    </body>
</html>
